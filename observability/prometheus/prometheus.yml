global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:8000"]

  - job_name: core
    metrics_path: /metrics
    static_configs:
      - targets: ["core:8001"]

  - job_name: replay
    metrics_path: /metrics
    static_configs:
      - targets: ["replay:8002"]

  - job_name: kafka_exporter
    metrics_path: /metrics
    static_configs:
      - targets: ["kafka-exporter:9308"]
